<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yggdrasill Mech RPG Mock</title>
  <link rel="stylesheet" href="style.css?v=auto-battle-v1">
</head>
<body>
  <div class="phone-shell">
    <div class="app-frame">
      <main id="app" class="screen" aria-live="polite"></main>
      <nav class="bottom-nav" aria-label="Main navigation">
        <button class="nav-btn" data-screen="bar" type="button" aria-label="酒場">
          <img class="nav-img" src="ui/menu_0.png" alt="">
          <span class="nav-label">酒場</span>
        </button>
        <button class="nav-btn" data-screen="hangar" type="button" aria-label="ハンガー">
          <img class="nav-img" src="ui/menu_1.png" alt="">
          <span class="nav-label">ハンガー</span>
        </button>
        <button class="nav-btn" data-screen="quest" type="button" aria-label="探索">
          <img class="nav-img" src="ui/menu_2.png" alt="">
          <span class="nav-label">探索</span>
        </button>
        <button class="nav-btn" data-screen="synthesis" type="button" aria-label="培養炉">
          <img class="nav-img" src="ui/menu_3.png" alt="">
          <span class="nav-label">生成</span>
        </button>
        <button class="nav-btn" data-screen="market" type="button" aria-label="マーケット">
          <img class="nav-img" src="ui/menu_4.png" alt="">
          <span class="nav-label">市場</span>
        </button>
        <button class="nav-btn" data-screen="menu" type="button" aria-label="メニュー">
          <img class="nav-img" src="ui/menu_5.png" alt="">
          <span class="nav-label">その他</span>
        </button>
      </nav>
    </div>
  </div>
  <script src="js/core/state.js?v=hangar-roster-v1" defer></script>
  <script src="js/data/classSkillMaster.js?v=status-v1" defer></script>
  <script src="js/core/status.js?v=base-ui-v1" defer></script>
  <script src="js/core/storage.js?v=hangar-roster-v1" defer></script>
  <script src="js/core/mechImageStore.js?v=hangar-roster-v1" defer></script>
  <script src="js/core/dataLoader.js?v=auto-battle-v1" defer></script>
  <script src="js/pilot.js?v=pilot-portraits-v1" defer></script>
  <script src="js/core/mechGeneration.js?v=mech-generation-v3" defer></script>
  <script src="js/core/urTestGrant.js?v=ur-test-v2" defer></script>
  <script src="js/core/router.js?v=hangar-roster-v1" defer></script>
  <script src="js/scenes/bar.js?v=pilot-list-v1" defer></script>
  <script src="js/scenes/hangar.js?v=hangar-roster-v1" defer></script>
  <script src="js/scenes/quest.js?v=auto-battle-v1" defer></script>
  <script src="js/scenes/battle.js?v=auto-battle-v1" defer></script>
  <script src="js/scenes/synthesis.js?v=hangar-roster-v1" defer></script>
  <script src="js/scenes/market.js?v=base-ui-v1" defer></script>
  <script src="js/scenes/menu.js?v=mech-master-v1" defer></script>
  <script src="main.js?v=auto-battle-v1" defer></script>
</body>
</html>
